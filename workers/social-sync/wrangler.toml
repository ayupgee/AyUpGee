name            = "ayupgee-social-sync"
main            = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Every 12 hours (06:00 + 18:00 UTC) + weekly Sunday 03:00 UTC cache cleanup
[triggers]
crons = ["0 6,18 * * *", "0 3 * * 0"]

# Shares the same D1 database as the Pages site
[[d1_databases]]
binding      = "DB"
database_name = "ayupgee-db"
database_id  = "3de6c874-0367-409a-8164-f7fb547a6d49"

# ─── Required secrets ──────────────────────────────────────────────────────────
# Set each secret with:  wrangler secret put <SECRET_NAME>  (run from workers/social-sync/)
#
# Instagram (via Behold.so):
#   BEHOLD_FEED_ID            — Feed ID from https://behold.so dashboard
#
# TikTok (via TikHub.io):
#   TIKHUB_API_KEY            — API key from https://user.tikhub.io (scope: /api/v1/tiktok/web/)
#
# Twitch VODs (official Helix API — https://dev.twitch.tv/console):
#   TWITCH_CLIENT_ID          — Client ID of your registered Twitch app
#   TWITCH_CLIENT_SECRET      — Client Secret of your registered Twitch app
#   TWITCH_BROADCASTER_ID     — Numeric user ID for twitch.tv/ayupgee
#                               Find it: GET /helix/users?login=ayupgee (with any client token)
#
# YouTube Videos (YouTube Data API v3 — https://console.cloud.google.com):
#   YOUTUBE_API_KEY           — API key with YouTube Data API v3 enabled
#
# ─── Optional secrets ──────────────────────────────────────────────────────────
#   YOUTUBE_UPLOADS_PLAYLIST_ID — Skips one API call per sync run.
#                                 Get it once: channels?part=contentDetails&forHandle=AyUpGee&key=…
#                                 Value looks like "UUxxxxxxxxxxxxxxxxxxxxxxxxxx"
