name            = "ayupgee-social-sync"
main            = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Every 12 hours (06:00 + 18:00 UTC) + weekly Sunday 03:00 UTC cache cleanup
[triggers]
crons = ["0 6,18 * * *", "0 3 * * 0"]

# Shares the same D1 database as the Pages site
[[d1_databases]]
binding      = "DB"
database_name = "ayupgee-db"
database_id  = "3de6c874-0367-409a-8164-f7fb547a6d49"

# ─── Required secrets ──────────────────────────────────────────────────────────
# Set via: wrangler secret put BEHOLD_FEED_ID  (from your Behold.so dashboard)
#
# ─── Future TikTok secrets (add when API is approved) ──────────────────────────
# wrangler secret put TIKTOK_ACCESS_TOKEN
# wrangler secret put TIKTOK_CLIENT_KEY
